databases:
  - name: passidoc-db2
    plan: free
    databaseName: passidoc_db2
    user: passidoc_db2_user

services:
  # ── Backend NestJS ──────────────────────────────────────────────────────────
  - type: web
    name: passidoc-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: passidoc-db2
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false          # ex: https://passidoc-app.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Frontend Angular ────────────────────────────────────────────────────────
  - type: static
    name: passidoc-app
    rootDir: frontend
    buildCommand: npm ci && npm run build -- --configuration=render
    staticPublishPath: dist/frontend/browser
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
