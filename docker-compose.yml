version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: passidoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-passidoc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Passidoc2024!}
      POSTGRES_DB: passidoc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-passidoc_user}", "-d", "passidoc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - passidoc-net

  minio:
    image: minio/minio
    container_name: passidoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - passidoc-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: passidoc-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - passidoc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: passidoc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - passidoc-net

volumes:
  postgres_data:
  minio_data:

networks:
  passidoc-net:
    driver: bridge
