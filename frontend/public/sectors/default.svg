<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Soft blue background blob -->
  <circle cx="100" cy="85" r="68" fill="#E3F2FD" opacity="0.9"/>
  <ellipse cx="100" cy="90" rx="76" ry="56" fill="#BBDEFB" opacity="0.5"/>

  <!-- Drop shadow for folder -->
  <ellipse cx="100" cy="140" rx="56" ry="8" fill="#000" opacity="0.10"/>

  <!-- === FOLDER (classic shape) === -->
  <!-- Folder tab (top-left) -->
  <path d="M42,82 Q42,74 52,74 L78,74 Q84,74 84,80 L84,82 Z" fill="#1565C0"/>
  <!-- Folder body main rectangle -->
  <rect x="42" y="82" width="116" height="60" rx="6" fill="#1976D2"/>
  <!-- Folder body lighter top face -->
  <rect x="42" y="82" width="116" height="8" rx="4" fill="#1E88E5"/>
  <!-- Folder inner shadow line -->
  <rect x="42" y="88" width="116" height="3" fill="#1565C0" opacity="0.3"/>
  <!-- Folder highlight stripe -->
  <rect x="48" y="85" width="60" height="3" rx="1" fill="#42A5F5" opacity="0.5"/>
  <!-- Fold crease at top body -->
  <line x1="42" y1="90" x2="158" y2="90" stroke="#1565C0" stroke-width="1.5" opacity="0.4"/>

  <!-- === DOCUMENT sticking out of folder top === -->
  <!-- Document white body -->
  <rect x="68" y="52" width="50" height="58" rx="4" fill="#FFFFFF"/>
  <!-- Document drop shadow -->
  <rect x="70" y="54" width="50" height="58" rx="4" fill="#90CAF9" opacity="0.25"/>
  <!-- Document folded corner top-right -->
  <polygon points="108,52 118,52 118,62 108,62" fill="#BBDEFB"/>
  <polygon points="108,52 118,62 108,62" fill="#90CAF9" opacity="0.7"/>
  <!-- Document lines (text placeholders) -->
  <rect x="74" y="66" width="30" height="4" rx="2" fill="#90CAF9" opacity="0.8"/>
  <rect x="74" y="74" width="36" height="4" rx="2" fill="#BBDEFB" opacity="0.9"/>
  <rect x="74" y="82" width="28" height="4" rx="2" fill="#90CAF9" opacity="0.7"/>
  <rect x="74" y="90" width="34" height="4" rx="2" fill="#BBDEFB" opacity="0.8"/>
  <rect x="74" y="98" width="24" height="4" rx="2" fill="#90CAF9" opacity="0.6"/>

  <!-- Folder clasp / metal tab center -->
  <rect x="90" y="140" width="20" height="6" rx="3" fill="#1565C0"/>
  <circle cx="100" cy="143" r="3" fill="#42A5F5"/>

  <!-- Small folder label area -->
  <rect x="50" y="112" width="50" height="12" rx="3" fill="#1E88E5" opacity="0.4"/>
  <rect x="54" y="115" width="28" height="4" rx="2" fill="#BBDEFB" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="26" cy="44" r="6" fill="#BBDEFB" opacity="0.7"/>
  <circle cx="175" cy="38" r="8" fill="#E3F2FD" opacity="0.8"/>
  <circle cx="174" cy="135" r="5" fill="#BBDEFB" opacity="0.5"/>
  <circle cx="24" cy="130" r="4" fill="#90CAF9" opacity="0.5"/>
</svg>
