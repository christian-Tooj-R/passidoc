<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Warm orange background blob -->
  <ellipse cx="95" cy="85" rx="78" ry="62" fill="#FFE0B2" opacity="0.85"/>
  <circle cx="75" cy="70" r="52" fill="#FFCC80" opacity="0.6"/>

  <!-- Drop shadow for bread -->
  <ellipse cx="85" cy="135" rx="48" ry="8" fill="#000" opacity="0.12"/>

  <!-- Bread loaf — main body (warm amber oval) -->
  <ellipse cx="85" cy="105" rx="46" ry="28" fill="#FFB300"/>
  <!-- Bread dark brown underside -->
  <ellipse cx="85" cy="122" rx="44" ry="14" fill="#E65100"/>
  <!-- Bread top golden highlight -->
  <ellipse cx="78" cy="93" rx="30" ry="13" fill="#FFCA28" opacity="0.7"/>
  <!-- Scoring lines on top of bread -->
  <line x1="62" y1="98" x2="75" y2="112" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="75" y1="93" x2="88" y2="110" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="91" x2="101" y2="108" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="110" y2="111" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Steam lines above bread -->
  <path d="M60 82 Q57 75 60 68 Q63 61 60 54" stroke="#BCAAA4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M78 78 Q75 70 78 62 Q81 54 78 46" stroke="#BCAAA4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M96 80 Q93 72 96 64 Q99 56 96 48" stroke="#BCAAA4" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whisk — shadow -->
  <ellipse cx="148" cy="136" rx="14" ry="5" fill="#000" opacity="0.10"/>

  <!-- Whisk handle (brown) -->
  <rect x="143" y="100" width="10" height="36" rx="5" fill="#6D4C41"/>
  <rect x="144" y="99" width="8" height="6" rx="2" fill="#8D6E63"/>

  <!-- Whisk wire loops (gray) -->
  <!-- Loop 1 -->
  <path d="M148 100 Q132 88 140 72 Q148 60 148 72" stroke="#9E9E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Loop 2 -->
  <path d="M148 100 Q138 84 143 68 Q148 56 148 68" stroke="#9E9E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Loop 3 -->
  <path d="M148 100 Q158 84 153 68 Q148 56 148 68" stroke="#9E9E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Loop 4 -->
  <path d="M148 100 Q164 88 156 72 Q148 60 148 72" stroke="#9E9E9E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Whisk center vertical line -->
  <line x1="148" y1="100" x2="148" y2="72" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  <!-- Whisk head band -->
  <ellipse cx="148" cy="98" rx="7" ry="3" fill="none" stroke="#757575" stroke-width="2"/>

  <!-- Small decorative dots -->
  <circle cx="32" cy="48" r="5" fill="#FFCC80" opacity="0.7"/>
  <circle cx="170" cy="38" r="7" fill="#FFE0B2" opacity="0.6"/>
  <circle cx="22" cy="115" r="4" fill="#FFCC80" opacity="0.5"/>
</svg>
