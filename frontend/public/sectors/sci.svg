<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Light blue sky background blob -->
  <circle cx="105" cy="72" r="68" fill="#E1F5FE" opacity="0.85"/>
  <ellipse cx="110" cy="80" rx="75" ry="58" fill="#B3E5FC" opacity="0.45"/>

  <!-- Green ground strip -->
  <rect x="0" y="128" width="200" height="32" rx="8" fill="#A5D6A7"/>
  <ellipse cx="100" cy="128" rx="95" ry="6" fill="#81C784" opacity="0.6"/>

  <!-- Drop shadow for house -->
  <ellipse cx="108" cy="133" rx="52" ry="7" fill="#000" opacity="0.10"/>

  <!-- === TREE (left) === -->
  <!-- Tree trunk -->
  <rect x="42" y="102" width="9" height="30" rx="3" fill="#795548"/>
  <!-- Tree foliage circle -->
  <circle cx="46" cy="95" r="22" fill="#388E3C"/>
  <circle cx="38" cy="88" r="12" fill="#43A047" opacity="0.7"/>
  <circle cx="55" cy="91" r="10" fill="#2E7D32" opacity="0.6"/>

  <!-- === HOUSE === -->
  <!-- House walls -->
  <rect x="75" y="90" width="80" height="45" rx="3" fill="#ECEFF1"/>
  <!-- House shadow side -->
  <rect x="140" y="90" width="15" height="45" rx="2" fill="#CFD8DC"/>

  <!-- Roof (dark red triangle) -->
  <polygon points="68,92 115,52 162,92" fill="#D84315"/>
  <!-- Roof highlight -->
  <polygon points="68,92 115,52 91,92" fill="#BF360C" opacity="0.3"/>
  <!-- Roof edge line -->
  <line x1="68" y1="92" x2="162" y2="92" stroke="#BF360C" stroke-width="2"/>

  <!-- Chimney (right side of roof) -->
  <rect x="140" y="60" width="12" height="22" rx="2" fill="#8D6E63"/>
  <rect x="138" y="58" width="16" height="5" rx="2" fill="#6D4C41"/>
  <!-- Chimney smoke puff -->
  <circle cx="146" cy="52" r="5" fill="#B0BEC5" opacity="0.7"/>
  <circle cx="150" cy="46" r="4" fill="#CFD8DC" opacity="0.55"/>
  <circle cx="144" cy="41" r="3" fill="#ECEFF1" opacity="0.5"/>

  <!-- Door (brown with cross-panel detail) -->
  <rect x="104" y="105" width="22" height="30" rx="2" fill="#5D4037"/>
  <!-- Door panels -->
  <rect x="107" y="108" width="7" height="9" rx="1" fill="#4E342E"/>
  <rect x="116" y="108" width="7" height="9" rx="1" fill="#4E342E"/>
  <rect x="107" y="120" width="7" height="10" rx="1" fill="#4E342E"/>
  <rect x="116" y="120" width="7" height="10" rx="1" fill="#4E342E"/>
  <!-- Door knob -->
  <circle cx="123" cy="120" r="2" fill="#FFC107"/>

  <!-- Left window -->
  <rect x="82" y="100" width="18" height="16" rx="2" fill="#B3E5FC"/>
  <line x1="91" y1="100" x2="91" y2="116" stroke="#fff" stroke-width="1.5"/>
  <line x1="82" y1="108" x2="100" y2="108" stroke="#fff" stroke-width="1.5"/>
  <!-- Left window frame -->
  <rect x="82" y="100" width="18" height="16" rx="2" fill="none" stroke="#90A4AE" stroke-width="1.5"/>

  <!-- Right window -->
  <rect x="130" y="100" width="18" height="16" rx="2" fill="#B3E5FC"/>
  <line x1="139" y1="100" x2="139" y2="116" stroke="#fff" stroke-width="1.5"/>
  <line x1="130" y1="108" x2="148" y2="108" stroke="#fff" stroke-width="1.5"/>
  <!-- Right window frame -->
  <rect x="130" y="100" width="18" height="16" rx="2" fill="none" stroke="#90A4AE" stroke-width="1.5"/>

  <!-- === KEY (bottom right) === -->
  <!-- Key drop shadow -->
  <ellipse cx="168" cy="148" rx="18" ry="5" fill="#000" opacity="0.10"/>
  <!-- Key ring (circle part) -->
  <circle cx="162" cy="136" r="10" fill="none" stroke="#FFC107" stroke-width="5"/>
  <circle cx="162" cy="136" r="5" fill="#FFD54F"/>
  <!-- Key shaft -->
  <rect x="161" y="142" width="6" height="22" rx="2" fill="#FFC107"/>
  <!-- Key teeth -->
  <rect x="167" y="148" width="5" height="4" rx="1" fill="#FFC107"/>
  <rect x="167" y="156" width="5" height="4" rx="1" fill="#FFC107"/>

  <!-- Decorative dots -->
  <circle cx="25" cy="40" r="6" fill="#B3E5FC" opacity="0.6"/>
  <circle cx="178" cy="30" r="8" fill="#E1F5FE" opacity="0.7"/>
</svg>
