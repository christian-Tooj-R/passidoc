<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Purple background blob -->
  <circle cx="100" cy="82" r="70" fill="#F3E5F5" opacity="0.9"/>
  <ellipse cx="100" cy="88" rx="80" ry="58" fill="#E1BEE7" opacity="0.5"/>

  <!-- === BRIEFCASE (left) === -->
  <!-- Briefcase drop shadow -->
  <ellipse cx="45" cy="140" rx="28" ry="6" fill="#000" opacity="0.10"/>
  <!-- Briefcase body -->
  <rect x="16" y="102" width="58" height="40" rx="6" fill="#8E24AA"/>
  <!-- Briefcase darker bottom -->
  <rect x="16" y="126" width="58" height="16" rx="4" fill="#6A1B9A"/>
  <!-- Briefcase handle arch -->
  <path d="M34,102 Q34,88 45,88 Q56,88 56,102" stroke="#6A1B9A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Briefcase clasp line -->
  <rect x="16" y="118" width="58" height="5" fill="#7B1FA2"/>
  <!-- Briefcase buckle / clasp detail -->
  <rect x="38" y="115" width="14" height="10" rx="3" fill="#9C27B0"/>
  <rect x="41" y="117" width="8" height="6" rx="2" fill="#CE93D8"/>
  <circle cx="45" cy="120" r="2" fill="#AB47BC"/>
  <!-- Briefcase stitching lines -->
  <rect x="20" y="106" width="50" height="1.5" rx="0.5" fill="#AB47BC" opacity="0.4"/>
  <rect x="20" y="136" width="50" height="1.5" rx="0.5" fill="#AB47BC" opacity="0.4"/>

  <!-- === BALANCE / JUSTICE SCALES (center) === -->
  <!-- Scale base drop shadow -->
  <ellipse cx="100" cy="148" rx="22" ry="5" fill="#000" opacity="0.10"/>

  <!-- Scale base ellipse -->
  <ellipse cx="100" cy="145" rx="20" ry="6" fill="#7B1FA2"/>
  <rect x="82" y="138" width="36" height="9" rx="3" fill="#9C27B0"/>

  <!-- Vertical pole -->
  <rect x="98" y="55" width="5" height="86" rx="2" fill="#7B1FA2"/>

  <!-- Horizontal crossbar -->
  <rect x="55" y="70" width="91" height="5" rx="2" fill="#AB47BC"/>
  <!-- Crossbar center cap -->
  <circle cx="100" cy="72" r="6" fill="#9C27B0"/>

  <!-- Left pan string -->
  <line x1="68" y1="74" x2="62" y2="100" stroke="#9C27B0" stroke-width="2"/>
  <line x1="80" y1="74" x2="86" y2="100" stroke="#9C27B0" stroke-width="2"/>
  <!-- Left pan (lower, with weight) -->
  <path d="M58,100 Q72,108 90,100" stroke="#AB47BC" stroke-width="3" fill="#CE93D8"/>
  <!-- Left weight circle -->
  <circle cx="74" cy="106" r="10" fill="#9C27B0"/>
  <circle cx="74" cy="106" r="6" fill="#AB47BC"/>
  <circle cx="71" cy="103" r="2.5" fill="#CE93D8" opacity="0.7"/>

  <!-- Right pan string -->
  <line x1="120" y1="74" x2="114" y2="95" stroke="#9C27B0" stroke-width="2"/>
  <line x1="132" y1="74" x2="138" y2="95" stroke="#9C27B0" stroke-width="2"/>
  <!-- Right pan (higher, lighter) -->
  <path d="M110,95 Q126,100 142,95" stroke="#AB47BC" stroke-width="3" fill="#E1BEE7"/>

  <!-- === DIPLOMA / DOCUMENT (right) === -->
  <!-- Document drop shadow -->
  <ellipse cx="164" cy="142" rx="26" ry="6" fill="#000" opacity="0.10"/>
  <!-- Document background -->
  <rect x="140" y="95" width="48" height="48" rx="5" fill="#F3E5F5"/>
  <!-- Document border -->
  <rect x="140" y="95" width="48" height="48" rx="5" fill="none" stroke="#CE93D8" stroke-width="2"/>
  <!-- Text lines (horizontal rectangles) -->
  <rect x="148" y="104" width="32" height="4" rx="2" fill="#CE93D8"/>
  <rect x="148" y="112" width="28" height="4" rx="2" fill="#CE93D8" opacity="0.7"/>
  <rect x="148" y="120" width="30" height="4" rx="2" fill="#CE93D8" opacity="0.6"/>
  <rect x="148" y="128" width="22" height="4" rx="2" fill="#CE93D8" opacity="0.5"/>
  <!-- Gold circular seal -->
  <circle cx="163" cy="134" r="9" fill="#FFC107"/>
  <circle cx="163" cy="134" r="6" fill="#FFB300"/>
  <!-- Seal star points -->
  <polygon points="163,126 164.4,131 169,131 165.3,134 166.7,139 163,136 159.3,139 160.7,134 157,131 161.6,131" fill="#FFF8E1" opacity="0.85"/>
  <!-- Seal ribbon at bottom of document -->
  <rect x="152" y="138" width="22" height="5" rx="2" fill="#CE93D8" opacity="0.5"/>

  <!-- Decorative dots -->
  <circle cx="18" cy="52" r="6" fill="#E1BEE7" opacity="0.7"/>
  <circle cx="185" cy="48" r="7" fill="#F3E5F5" opacity="0.8"/>
  <circle cx="185" cy="148" r="4" fill="#CE93D8" opacity="0.4"/>
  <circle cx="16" cy="148" r="4" fill="#E1BEE7" opacity="0.4"/>
</svg>
